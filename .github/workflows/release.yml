name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build archives
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 freebsd/amd64; do
            GOOS=${pair%/*}
            GOARCH=${pair#*/}
            BIN=tltv
            if [ "$GOOS" = "windows" ]; then BIN=tltv.exe; fi

            echo "Building ${GOOS}/${GOARCH}..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "dist/${BIN}" .

            ARCHIVE="tltv-cli_${VERSION}_${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              python3 -c "import zipfile,sys; z=zipfile.ZipFile(sys.argv[1],'w',zipfile.ZIP_DEFLATED); z.write(sys.argv[2],sys.argv[3]); z.close()" "dist/${ARCHIVE}.zip" "dist/${BIN}" "$BIN"
            else
              tar -czf "dist/${ARCHIVE}.tar.gz" -C dist "$BIN"
            fi
            rm "dist/${BIN}"
          done

      - name: Verify Linux amd64 is static
        run: |
          CGO_ENABLED=0 go build -ldflags "-s -w" -o tltv-check .
          output=$(ldd ./tltv-check 2>&1 || true)
          case "$output" in
            *"not a dynamic executable"*) echo "OK: static binary" ;;
            *) echo "ERROR: binary is dynamically linked"; echo "$output"; exit 1 ;;
          esac
          rm ./tltv-check

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Detect release target
        id: detect
        env:
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if echo "$SERVER" | grep -q "github\.com"; then
            echo "api_base=https://api.github.com/repos/${REPO}" >> "$GITHUB_OUTPUT"
            echo "upload_mode=github" >> "$GITHUB_OUTPUT"
          else
            echo "api_base=${SERVER}/api/v1/repos/${REPO}" >> "$GITHUB_OUTPUT"
            echo "upload_mode=forgejo" >> "$GITHUB_OUTPUT"
          fi

          PRERELEASE=false
          if echo "$TAG" | grep -qE '(rc|alpha|beta)'; then
            PRERELEASE=true
          fi
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "API base: $(echo "$SERVER" | grep -q 'github\.com' && echo 'GitHub' || echo 'Forgejo')"
          echo "Tag: ${TAG}, Prerelease: ${PRERELEASE}"

      - name: Delete stale release
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          API_BASE: ${{ steps.detect.outputs.api_base }}
        run: |
          echo "Checking for existing release at tag ${TAG}..."
          EXISTING=$(curl -sS -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: token ${TOKEN}" \
            "${API_BASE}/releases/tags/${TAG}" 2>&1)
          HTTP_CODE=$(echo "$EXISTING" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          BODY=$(echo "$EXISTING" | sed '/^HTTP_CODE:/d')
          echo "Lookup status: ${HTTP_CODE}"

          if [ "$HTTP_CODE" = "200" ]; then
            EXISTING_ID=$(echo "$BODY" | grep -o '"id" *: *[0-9]*' | head -1 | grep -o '[0-9]*')
            if [ -n "$EXISTING_ID" ]; then
              echo "Deleting stale release (id: ${EXISTING_ID})..."
              curl -sS -w "\nHTTP_CODE:%{http_code}" -X DELETE \
                -H "Authorization: token ${TOKEN}" \
                "${API_BASE}/releases/${EXISTING_ID}" 2>&1
            fi
          else
            echo "No existing release found (expected for first run)"
          fi

      - name: Create release
        id: release
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          API_BASE: ${{ steps.detect.outputs.api_base }}
          UPLOAD_MODE: ${{ steps.detect.outputs.upload_mode }}
          PRERELEASE: ${{ steps.detect.outputs.prerelease }}
        run: |
          echo "Creating release ${TAG}..."

          if [ -z "$TOKEN" ]; then
            echo "ERROR: TOKEN is empty -- secrets.GITHUB_TOKEN not available"
            exit 1
          fi

          BODY="## tltv-cli ${TAG}

          Single static binary. Zero dependencies.

          \`\`\`bash
          curl -sSL https://raw.githubusercontent.com/tltv-org/cli/main/install.sh | sh
          \`\`\`

          Pre-built for Linux, macOS, Windows (amd64 + arm64) and FreeBSD (amd64)."

          # Auto-generate changelog on GitHub
          if [ "$UPLOAD_MODE" = "github" ]; then
            AUTO_NOTES=$(curl -sS -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"${TAG}\"}" \
              "${API_BASE}/releases/generate-notes" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))" 2>/dev/null || true)
            if [ -n "$AUTO_NOTES" ]; then
              BODY="${BODY}

          ---

          ${AUTO_NOTES}"
            fi
          fi

          BODY_JSON=$(echo "$BODY" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          RESPONSE=$(curl -sS -w "\nHTTP_CODE:%{http_code}" -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"tltv-cli ${TAG}\",\"body\":${BODY_JSON},\"draft\":false,\"prerelease\":${PRERELEASE}}" \
            "${API_BASE}/releases" 2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          BODY_RESP=$(echo "$RESPONSE" | sed '/^HTTP_CODE:/d')
          echo "HTTP status: ${HTTP_CODE}"

          RELEASE_ID=$(echo "$BODY_RESP" | grep -o '"id" *: *[0-9]*' | head -1 | grep -o '[0-9]*')
          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: Failed to create release (no id in response)"
            exit 1
          fi

          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "Created release ${TAG} (id: ${RELEASE_ID})"

      - name: Upload assets
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          API_BASE: ${{ steps.detect.outputs.api_base }}
          UPLOAD_MODE: ${{ steps.detect.outputs.upload_mode }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          echo "Uploading assets to release ${RELEASE_ID}..."
          ls -la dist/

          for file in dist/*; do
            filename=$(basename "$file")
            echo "Uploading ${filename} ($(stat -c%s "$file") bytes)..."

            if [ "$UPLOAD_MODE" = "github" ]; then
              UPLOAD_RESP=$(curl -sS -w "\nHTTP_CODE:%{http_code}" -X POST \
                -H "Authorization: token ${TOKEN}" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@${file}" \
                "https://uploads.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${filename}" 2>&1)
            else
              UPLOAD_RESP=$(curl -sS -w "\nHTTP_CODE:%{http_code}" -X POST \
                -H "Authorization: token ${TOKEN}" \
                -F "attachment=@${file}" \
                "${API_BASE}/releases/${RELEASE_ID}/assets?name=${filename}" 2>&1)
            fi

            HTTP_CODE=$(echo "$UPLOAD_RESP" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
            if [ "$HTTP_CODE" != "201" ]; then
              echo "WARNING: Upload ${filename} returned HTTP ${HTTP_CODE}"
              echo "$UPLOAD_RESP" | sed '/^HTTP_CODE:/d'
            else
              echo "  OK: ${filename}"
            fi
          done

          echo "Uploaded $(ls dist/* | wc -l) assets"
