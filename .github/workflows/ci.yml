name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -count=1 ./...

      - name: Build (static)
        run: CGO_ENABLED=0 go build -v -ldflags "-s -w" -o tltv .

      - name: Verify static linkage
        run: |
          ldd ./tltv 2>&1 | grep -q "not a dynamic executable" || \
            (echo "ERROR: binary is dynamically linked" && ldd ./tltv && exit 1)
